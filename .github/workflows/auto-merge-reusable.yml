# Reusable auto-merge workflow for ANcpLua framework repos.
#
# Why a GitHub App instead of GITHUB_TOKEN:
# When auto-merge fires under GITHUB_TOKEN identity, the resulting `push: main`
# event is silently filtered by GitHub (anti-loop protection), so downstream
# publish workflows never run. Using an App installation token makes the App
# the merge actor — push events fire normally and downstream workflows trigger.
# See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
#
# Tiers:
# 1a. Dependabot PRs: Auto-approve + auto-merge for patch/minor
# 1b. Renovate PRs: Auto-approve + auto-merge
# 2.  Trusted-bot fix PRs (copilot[bot]/jules[bot]/claude-code[bot] +
#     matching branch + not draft): Auto-approve + auto-merge
# 3.  CodeRabbit approved PRs: Auto-merge when CI passes
# 4.  Owner PRs: Auto-merge when CI passes
#
# Tier 2 trust model: the previous version of this lane keyed off
# `github.actor` + branch prefix, which a human can spoof by pushing a
# branch named `claude/foo` from their own account. The current version
# requires `pull_request.user.login` (the immutable original author) to
# match a known bot identity AND the branch prefix to match AND the PR
# to not be in draft. That's a "trusted-bot" pattern, not a rubber-stamp:
# the App, branch, and not-draft together establish intent.
#
# Auto-merge fallback pattern: every tier's merge step uses
# `gh pr merge --auto --squash || gh pr merge --squash`. Plain `--auto`
# refuses with "Pull request is in clean status" when the PR is already
# mergeable at the moment the workflow fires (all required checks already
# passed before the auto-merge job got a chance to queue) — the fallback
# direct-squash makes those PRs land immediately instead of sitting open.

name: Auto-merge (reusable)

on:
  workflow_call:
    secrets:
      AUTOMERGE_APP_ID:
        description: "GitHub App ID for the auto-merge App (required)"
        required: true
      AUTOMERGE_APP_PRIVATE_KEY:
        description: "GitHub App private key (PEM contents) for the auto-merge App (required)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v2.1.4
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Auto-approve patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge for patch and minor
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"

      - name: Request Claude review for major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREV_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: |
          gh pr comment "$PR_URL" --body "## ⚠️ Major Version Update

          @claude Please review this major version update for breaking changes and merge if safe.

          | Dependency | Update |
          |------------|--------|
          | \`$DEP_NAMES\` | \`$PREV_VERSION\` → \`$NEW_VERSION\` |

          Check the changelog and verify compatibility."

  renovate-auto-merge:
    name: Renovate auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]'
    steps:
      - uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v2.1.4
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Auto-approve Renovate PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge for Renovate
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"

  ai-agent-auto-merge:
    name: AI Agent auto-merge (trusted bot identities)
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      (
        github.event.pull_request.user.login == 'copilot[bot]' ||
        github.event.pull_request.user.login == 'jules[bot]' ||
        github.event.pull_request.user.login == 'claude-code[bot]'
      ) &&
      (
        startsWith(github.event.pull_request.head.ref, 'copilot/') ||
        startsWith(github.event.pull_request.head.ref, 'jules/') ||
        startsWith(github.event.pull_request.head.ref, 'claude/')
      )
    steps:
      - uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v2.1.4
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Identify AI agent
        id: agent
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          case "$AUTHOR" in
            copilot\[bot\]) echo "agent=Copilot" >> "$GITHUB_OUTPUT" ;;
            jules\[bot\])   echo "agent=Jules"   >> "$GITHUB_OUTPUT" ;;
            claude-code\[bot\]) echo "agent=Claude" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Auto-approve AI agent PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AGENT: ${{ steps.agent.outputs.agent }}
        run: |
          echo "Auto-approving $AGENT PR"
          gh pr review --approve "$PR_URL" --body "✅ Auto-approved: $AGENT autonomous fix PR (trusted-bot identity verified)"

      - name: Enable auto-merge for AI agent PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"

  coderabbit-auto-merge:
    name: CodeRabbit auto-merge
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.review.user.login == 'coderabbitai[bot]'
    steps:
      - uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v2.1.4
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Enable auto-merge for CodeRabbit approved PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"

  owner-auto-merge:
    name: Owner auto-merge
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == github.event.repository.owner.login &&
      github.event.pull_request.draft == false
    steps:
      - uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v2.1.4
        id: app-token
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Enable auto-merge for owner PRs
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "$PR_URL" || gh pr merge --squash "$PR_URL"
