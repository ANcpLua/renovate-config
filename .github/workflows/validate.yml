name: Validate

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CHANGELOG.md'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Conftest
        env:
          CONFTEST_VERSION: 0.62.0
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest
          conftest --version

      - name: Validate config against policy
        run: conftest test default.json --policy policy/ --data data/microsoft-agent-framework-packages.json --no-color

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.11.0
          cache: npm

      - name: Install Renovate
        run: npm ci

      - name: Validate Renovate config schema
        run: npx renovate-config-validator --strict default.json
